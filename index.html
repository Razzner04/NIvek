<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nivek Perfumes</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --cyan: #00bcd4;
  --cyan-dark: #0097a7;
  --cyan-light: #e0f7fa;
  --black: #111;
  --gray: #444;
  --gray-light: #888;
  --border: #e8e8e8;
  --bg: #f5f5f5;
  --white: #fff;
  --fem: #e91e8c;
  --masc: #1976d2;
  --uni: #2e7d32;
  --ext: #00bcd4;
}

body { font-family:'Nunito', sans-serif; background:var(--bg); color:var(--black); }

/* ── ANNOUNCEMENT BAR ───────────────────────────────────────── */
.ann-bar {
  background: var(--black);
  color: #fff;
  height: 36px;
  overflow: hidden;
  position: relative;
}
.ann-track {
  display: flex;
  white-space: nowrap;
  animation: marquee 30s linear infinite;
  height: 100%;
  align-items: center;
}
.ann-track span {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0 40px;
}
.ann-track span::before { content:'✦'; margin-right:12px; color:var(--cyan); }
@keyframes marquee { from { transform:translateX(0); } to { transform:translateX(-50%); } }

/* ── NAVBAR ─────────────────────────────────────────────────── */
.navbar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.nav-inner {
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.nav-left { display:flex; align-items:center; gap:10px; }
.nav-logo-img { height:36px; width:auto; object-fit:contain; }
.nav-store-text {
  font-family:'Bebas Neue',sans-serif;
  font-size:1.25rem;
  letter-spacing:0.1em;
  color:#111;
  line-height:1;
  margin-left:2px;
}
.nav-right { display:flex; align-items:center; gap:8px; }
.nav-search {
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:20px;
  padding:6px 14px;
  font-family:inherit;
  font-size:0.78rem;
  color:var(--black);
  outline:none;
  width:220px;
  transition:border-color 0.2s;
}
.nav-search:focus { border-color:var(--cyan); }
@media(max-width:768px){
  .nav-search { width:130px; font-size:0.72rem; padding:5px 10px; }
  .nav-store-text { font-size:1.1rem; }
  .nav-logo-img { height:30px; }
}

/* Logo */
/* nav-logo replaced */

/* Nav links */
.nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
  flex: 1;
}
.nav-link {
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--gray);
  text-decoration: none;
  padding: 8px 12px;
  border-radius: 6px;
  transition: all 0.2s;
  white-space: nowrap;
  cursor: pointer;
  background: none;
  border: none;
  font-family: inherit;
  position: relative;
}
.nav-link:hover { background: var(--cyan-light); color: var(--cyan-dark); }
.nav-link.active { color: var(--cyan); }

/* Dropdown */
.nav-dropdown { position: relative; }
.dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  min-width: 220px;
  overflow: hidden;
  z-index: 300;
}
.nav-dropdown:hover .dropdown-menu { display: block; }
.dropdown-section { padding: 8px 0; }
.dropdown-title {
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gray-light);
  padding: 6px 16px 4px;
}
.dropdown-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--gray);
  cursor: pointer;
  transition: background 0.15s;
}
.dropdown-item:hover { background: var(--cyan-light); color: var(--cyan-dark); }
.dropdown-item .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dropdown-divider { border:none; border-top:1px solid var(--border); margin: 4px 0; }

/* Nav right */
.nav-right {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
}
/* nav-search in nav-left CSS */
.cart-btn {
  position: relative;
  background: var(--cyan);
  border: none;
  border-radius: 8px;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.2s;
  color: #fff;
  flex-shrink: 0;
}
.cart-btn:hover { background: var(--cyan-dark); }
.cart-badge {
  position: absolute;
  top: -5px; right: -5px;
  background: #ff5252;
  color: #fff;
  font-size: 0.55rem;
  font-weight: 800;
  width: 16px; height: 16px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

/* Mobile menu btn */
.menu-btn { background: none; border: none; cursor: pointer; padding: 6px; color: var(--black); }

/* ── HERO STATS ─────────────────────────────────────────────── */
.hero {
  background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0d0d1a 100%);
  color: #fff;
  padding: 48px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 80% at 50% 50%, rgba(0,188,212,0.12), transparent);
}
.hero-content { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; }
.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 600;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.hero-title span { color: var(--cyan); }
.hero-sub {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 32px;
}
.hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}
.hero-stat { text-align: center; }
.hero-stat-num {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--cyan);
  display: block;
  line-height: 1;
}
.hero-stat-label {
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-top: 4px;
}

/* ── FILTER BAR ─────────────────────────────────────────────── */
.filter-bar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  position: sticky;
  top: 64px;
  z-index: 100;
}
.filter-bar-inner {
  max-width: 1300px;
  margin: 0 auto;
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.filter-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-light);
}
.filter-chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.chip {
  background: var(--bg);
  border: 1.5px solid var(--border);
  color: var(--gray);
  padding: 5px 14px;
  border-radius: 20px;
  font-family: inherit;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--cyan); color: var(--cyan); }
.chip.active { background: var(--cyan); border-color: var(--cyan); color: #fff; }
.chip.fem.active { background: var(--fem); border-color: var(--fem); }
.chip.masc.active { background: var(--masc); border-color: var(--masc); }
.chip.uni.active { background: var(--uni); border-color: var(--uni); }
.chip.ext.active { background: var(--ext); border-color: var(--ext); }

.sort-sel {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  font-family: inherit;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--gray);
  cursor: pointer;
  outline: none;
  margin-left: auto;
}
.price-filter {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.7rem;
  color: var(--gray);
}
.price-filter input[type=range] {
  -webkit-appearance: none;
  width: 100px;
  height: 3px;
  background: var(--cyan);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
.price-filter input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  background: var(--cyan);
  border-radius: 50%;
}
.results-info {
  font-size: 0.7rem;
  color: var(--gray-light);
  white-space: nowrap;
}
.results-info strong { color: var(--cyan); }

/* ── MAIN LAYOUT ────────────────────────────────────────────── */
.main {
  max-width: 1300px;
  margin: 0 auto;
  padding: 28px 20px 60px;
}

/* Category divider */
.cat-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 32px 0 20px;
}
.cat-header-badge {
  font-size: 0.7rem;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 20px;
  color: #fff;
  white-space: nowrap;
}
.cat-header-badge.fem { background: var(--fem); }
.cat-header-badge.masc { background: var(--masc); }
.cat-header-badge.uni { background: var(--uni); }
.cat-header-badge.ext { background: var(--ext); }
.cat-header-line { flex:1; height:1px; background: var(--border); }
.cat-header-count {
  font-size: 0.65rem;
  color: var(--gray-light);
  white-space: nowrap;
}

/* Brand section */
.brand-section { margin-bottom: 36px; }
.brand-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--black);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-title .brand-count {
  font-family: 'Nunito', sans-serif;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--gray-light);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 10px;
}

/* Product grid */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

/* Product card */
.product-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s;
  display: flex;
  flex-direction: column;
  animation: fadeUp 0.3s ease both;
  position: relative;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.product-card:hover {
  border-color: var(--cyan);
  box-shadow: 0 4px 20px rgba(0,188,212,0.15);
  transform: translateY(-2px);
}
.card-cat-stripe {
  height: 3px;
  width: 100%;
}
.card-cat-stripe.fem { background: var(--fem); }
.card-cat-stripe.masc { background: var(--masc); }
.card-cat-stripe.uni { background: var(--uni); }
.card-cat-stripe.ext { background: var(--ext); }

.card-img {
  width: 100%;
  height: 160px;
  background: #f8f8f8;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}
.card-img img {
  max-height: 145px;
  max-width: 88%;
  object-fit: contain;
  transition: transform 0.3s;
}
.product-card:hover .card-img img { transform: scale(1.05); }
.card-img-ph {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: #ccc;
}
.card-img-ph .ph-emoji { font-size: 2rem; }
.card-img-ph .ph-name {
  font-size: 0.55rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: center;
  padding: 0 10px;
  line-height: 1.4;
}

.card-body { padding: 12px 14px 14px; flex:1; display:flex; flex-direction:column; }
.card-cat-tag {
  font-size: 0.58rem;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.card-cat-tag.fem { color: var(--fem); }
.card-cat-tag.masc { color: var(--masc); }
.card-cat-tag.uni { color: var(--uni); }
.card-cat-tag.ext { color: var(--ext); }
.card-name {
  font-family: 'Bebas Neue', sans-serif;
  font-weight: 400;
  font-size: 1.1rem;
  color: var(--black);
  line-height: 1.2;
  margin-bottom: 4px;
  flex: 1;
  letter-spacing: 0.04em;
}
.card-vol { font-size: 0.7rem; color: var(--gray-light); }
.card-dupe {
  font-size: 0.62rem;
  color: var(--gray-light);
  font-style: italic;
  margin: 6px 0 8px;
  line-height: 1.4;
}
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.card-price {
  font-weight: 800;
  font-size: 0.95rem;
  color: var(--cyan-dark);
}
.card-add-btn {
  background: var(--cyan);
  border: none;
  border-radius: 6px;
  color: #fff;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 1rem;
  transition: background 0.2s;
  flex-shrink: 0;
}
.card-add-btn:hover { background: var(--cyan-dark); }

.no-results {
  text-align: center;
  padding: 80px 20px;
  font-size: 1.1rem;
  color: var(--gray-light);
  display: none;
}

/* ── MODAL ──────────────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 500;
  justify-content: center;
  align-items: flex-start;
  padding: 30px 16px;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white);
  border-radius: 16px;
  max-width: 680px;
  width: 100%;
  overflow: hidden;
  animation: modalIn 0.3s ease;
  position: relative;
  margin: auto;
}
@keyframes modalIn { from { opacity:0; transform:translateY(20px) scale(.97); } to { opacity:1; transform:none; } }
.modal-stripe { height: 4px; width: 100%; }
.modal-stripe.fem { background: var(--fem); }
.modal-stripe.masc { background: var(--masc); }
.modal-stripe.uni { background: var(--uni); }
.modal-stripe.ext { background: var(--ext); }
.modal-close {
  position: absolute; top:14px; right:16px;
  background: var(--bg); border: none; border-radius: 50%;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem; color: var(--gray);
  transition: background 0.2s;
}
.modal-close:hover { background: var(--border); }
.modal-body { padding: 24px 28px 28px; }
.modal-top { display: flex; gap: 22px; margin-bottom: 20px; }
.modal-img {
  width: 150px; min-width: 150px; height: 190px;
  border-radius: 10px;
  background: #f8f8f8;
  border: 1px solid var(--border);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.modal-img img { max-height:175px; max-width:90%; object-fit:contain; padding:6px; }
.modal-info { flex:1; min-width:0; }
.modal-brand {
  font-size: 0.62rem;
  font-weight: 800;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gray-light);
  margin-bottom: 5px;
}
.modal-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--cyan-dark);
  line-height: 1.2;
  margin-bottom: 10px;
}
.modal-price {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--black);
  margin-bottom: 10px;
}
.modal-dupe-label {
  font-size: 0.6rem;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-light);
  margin-bottom: 3px;
}
.modal-dupe { font-size: 0.82rem; color: var(--black); font-style: italic; font-weight: 600; }
.modal-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.modal-badge {
  font-size: 0.6rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--gray);
}
.modal-divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
.modal-section-title {
  font-size: 0.6rem;
  font-weight: 800;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--black);
  margin-bottom: 8px;
}
.modal-desc { font-size: 0.85rem; color: var(--black); line-height: 1.75; }
.notes-legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; }
.notes-legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.58rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--gray-light);
}
.notes-legend-dot { width:7px; height:7px; border-radius:50%; }
.notes-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.note-tag {
  font-size: 0.65rem; padding: 4px 11px;
  border-radius: 20px; font-weight: 600;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--black);
}
.note-tag.top { background: #e0f7fa; border-color: #b2ebf2; color: #006064; }
.note-tag.mid { background: #fce4ec; border-color: #f8bbd0; color: #880e4f; }
.note-tag.base { background: #e8f5e9; border-color: #c8e6c9; color: #1b5e20; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
.btn-wa {
  flex: 1; min-width: 140px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: #25d366; color: #fff;
  border: none; border-radius: 8px;
  font-family: inherit; font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 12px 16px; cursor: pointer;
  text-decoration: none;
  transition: background 0.2s;
}
.btn-wa:hover { background: #128c7e; }
.btn-cart {
  flex: 1; min-width: 140px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--cyan); color: #fff;
  border: none; border-radius: 8px;
  font-family: inherit; font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 12px 16px; cursor: pointer;
  transition: background 0.2s;
}
.btn-cart:hover { background: var(--cyan-dark); }

/* ── CART PANEL ─────────────────────────────────────────────── */
.cart-overlay {
  display: none; position: fixed; inset: 0;
  z-index: 600; background: rgba(0,0,0,0.4);
  backdrop-filter: blur(3px);
  justify-content: flex-end;
}
.cart-overlay.open { display: flex; }
.cart-panel {
  background: var(--white);
  width: 100%; max-width: 400px;
  height: 100%; display: flex; flex-direction: column;
  animation: slideIn 0.28s ease;
  box-shadow: -4px 0 20px rgba(0,0,0,0.12);
}
@keyframes slideIn { from { transform:translateX(100%); } to { transform:none; } }
@keyframes slideInLeft { from { transform:translateX(-100%); } to { transform:none; } }
.cart-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
}
.cart-head-title {
  font-weight: 800; font-size: 1rem; color: var(--black);
  display: flex; align-items: center; gap: 8px;
}
.cart-head-close {
  background: var(--bg); border: none; border-radius: 50%;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem; color: var(--gray);
}
.cart-items-list {
  flex: 1; overflow-y: auto; padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.cart-empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%;
  gap: 10px; color: var(--gray-light);
  font-size: 0.85rem;
}
.cart-item {
  background: var(--bg); border-radius: 10px;
  padding: 12px; display: flex; align-items: center; gap: 10px;
  border-left: 3px solid var(--cyan);
}
.cart-item-info { flex:1; min-width:0; }
.cart-item-name { font-weight: 700; font-size: 0.82rem; color: var(--black); }
.cart-item-brand { font-size: 0.62rem; color: var(--gray-light); text-transform: uppercase; letter-spacing: 0.08em; margin-top:2px; }
.cart-item-price { font-weight: 800; font-size: 0.9rem; color: var(--cyan-dark); white-space: nowrap; }
.cart-item-remove {
  background: none; border: none; color: #ccc;
  cursor: pointer; font-size: 1rem; padding: 4px;
  transition: color 0.2s;
}
.cart-item-remove:hover { color: #f44336; }
.cart-foot {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}
.cart-total-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
.cart-total-label { font-weight: 700; font-size: 0.82rem; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; }
.cart-total-val { font-weight: 800; font-size: 1.3rem; color: var(--black); }
.btn-checkout {
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  background: #25d366; color: #fff;
  border: none; border-radius: 8px;
  font-family: inherit; font-size: 0.8rem; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 14px; cursor: pointer;
  transition: background 0.2s;
}
.btn-checkout:hover { background: #128c7e; }

/* Toast */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: var(--black); color: #fff;
  font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 700;
  padding: 10px 22px; border-radius: 30px;
  z-index: 900; opacity: 0;
  transition: opacity 0.3s;
  white-space: nowrap;
  border-left: 3px solid var(--cyan);
}

/* Footer */
footer {
  background: var(--black);
  color: rgba(255,255,255,0.5);
  text-align: center;
  padding: 24px;
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
footer span { color: var(--cyan); }

/* ── RESPONSIVE ─────────────────────────────────────────────── */
@media(max-width:768px) {

  .nav-links, .nav-search { display: none; }
  .menu-btn { display: flex; align-items: center; }
  .products-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
  .modal-top { flex-direction: column; }
  .modal-img { width: 100%; min-width: unset; height: 170px; }
  .modal-body { padding: 18px; }
  .filter-bar-inner { gap: 8px; }
  .sort-sel, .price-filter { display: none; }
}
</style>
</head>

};

function getNotesInfo(p) {
  const tryKey = (str) => {
    if (!str) return null;
    // Normalize: lowercase, remove accents, remove brand suffix " - Brand"
    let k = str.toLowerCase()
      .replace(/ - .+$/, '')           // remove "- Brand" part
      .replace(/[àáâãä]/g,'a').replace(/[èéêë]/g,'e')
      .replace(/[ìíîï]/g,'i').replace(/[òóôõö]/g,'o')
      .replace(/[ùúûü]/g,'u').replace(/[ñ]/g,'n')
      .replace(/'/g,"'").replace(/'/g,"'")
      .replace(/\s+\d+ml\s*/g,' ').replace(/\s*(fem|masc|unisex)\s*/gi,' ')
      .replace(/\s+/g,' ').trim();
    if (notesDB[k]) return notesDB[k];
    // Try without trailing words like "intense", "parfum", etc.
    const simplified = k.replace(/\s*(intense|parfum|elixir|noir|blanche|gold|rouge|extreme|absolu|extrait|edp)\s*$/,'').trim();
    if (notesDB[simplified]) return notesDB[simplified];
    // Try matching just first word+second word
    const parts = k.split(' ');
    if (parts.length >= 2) {
      const two = parts.slice(0,2).join(' ');
      if (notesDB[two]) return notesDB[two];
    }
    return null;
  };

  // 1. Try dupe name (strip brand)
  let info = tryKey(p.dupe);
  if (info) return {...info};

  // 2. Try perfume name itself
  info = tryKey(p.name);
  if (info) return {...info};

  // 3. Try brand-specific defaults
  const brand = (p.brand||'').toLowerCase();
  const name = (p.name||'').toLowerCase();
  if (name.includes('oud')) return {...notesDB['default'], familia:'Oud Oriental', sal:['Oud','Azafrán','Rosa'], cor:['Ámbar','Patchouli','Incienso'], bas:['Sándalo','Cuero','Almizcle'], desc:'Una fragancia árabe de oud intensa y misteriosa que combina el poder del oud con especias orientales y notas amaderadas.'};
  if (name.includes('rose') || name.includes('rosa')) return {...notesDB['default'], familia:'Floral Oriental', sal:['Rosa','Bergamota'], cor:['Jazmín','Geranio'], bas:['Almizcle','Ámbar','Sándalo'], desc:'Una fragancia floral centrada en la rosa, evocando elegancia y femineidad con un toque oriental cálido.'};
  if (name.includes('vanilla') || name.includes('vainilla')) return {...notesDB['default'], familia:'Gourmand Oriental', sal:['Vainilla','Bergamota'], cor:['Tonka','Caramelo'], bas:['Almizcle','Madera','Ámbar'], desc:'Una fragancia gourmand cálida y envolvente con vainilla como nota protagonista.'};

  return {...notesDB['default']};
}


// ── RENDER ───────────────────────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach((b,i) => {
    b.classList.remove('active');
    if (['all','fem','masc','uni','ext'][i] === f) b.classList.add('active');
  });
  render();
}
function setSort(v) { activeSort = v; render(); }
function setSearch(v) { searchTerm = v.toLowerCase(); render(); }
function setPriceFilter(v) {
  maxPrice = parseInt(v);
  document.getElementById('price-val').textContent = v >= 520000 ? 'Sin límite' : '$' + parseInt(v).toLocaleString('es-AR');
  render();
}

let searchOpen = false;
function toggleSearch() {
  const input = document.getElementById('nav-search-input');
  const btn = document.getElementById('search-btn');
  searchOpen = !searchOpen;
  if (searchOpen) {
    input.style.width = '200px';
    input.style.padding = '6px 14px';
    input.style.opacity = '1';
    input.style.borderColor = 'var(--cyan)';
    input.focus();
    btn.style.background = 'var(--cyan-light)';
    btn.style.color = 'var(--cyan-dark)';
  } else {
    input.style.width = '0';
    input.style.padding = '0';
    input.style.opacity = '0';
    input.style.borderColor = 'transparent';
    input.value = '';
    setSearch('');
    btn.style.background = 'none';
    btn.style.color = '#444';
  }
}
// Close search on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && searchOpen) toggleSearch();
});

function render() {
  let products = allProducts.filter(p => {
    if (activeFilter !== 'all' && p.cat !== activeFilter) return false;
    if (p.cat !== 'ext' && p.price > maxPrice) return false;
    if (searchTerm && !p.name.toLowerCase().includes(searchTerm) && !p.brand.toLowerCase().includes(searchTerm)) return false;
    return true;
  });

  document.getElementById('shown-count').textContent = products.length;
  const catalog = document.getElementById('catalog');
  const noResults = document.getElementById('no-results');

  if (!products.length) {
    catalog.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  let sorted = [...products];
  if (activeSort === 'price-asc') sorted.sort((a,b) => a.price - b.price);
  else if (activeSort === 'price-desc') sorted.sort((a,b) => b.price - a.price);
  else if (activeSort === 'name') sorted.sort((a,b) => a.name.localeCompare(b.name));

  let html = '';

  if (activeSort === 'default') {
    const catOrder = activeFilter === 'all' ? ['fem','masc','uni','ext'] : [activeFilter];
    catOrder.forEach(cat => {
      const cp = sorted.filter(p => p.cat === cat);
      if (!cp.length) return;
      html += `<div class="cat-header">
        <span class="cat-header-badge ${cat}">${catLabels[cat]}</span>
        <div class="cat-header-line"></div>
        <span class="cat-header-count">${cp.length} fragancias</span>
      </div>`;
      const brands = [...new Set(cp.map(p => p.brand))];
      brands.forEach(brand => {
        const bp = cp.filter(p => p.brand === brand);
        html += `<div class="brand-section">
          <div class="brand-title">${brand} <span class="brand-count">${bp.length}</span></div>
          <div class="products-grid">`;
        bp.forEach((p, i) => html += cardHTML(p, i));
        html += `</div></div>`;
      });
    });
  } else {
    html += '<div class="products-grid" style="margin-top:8px">';
    sorted.forEach((p, i) => html += cardHTML(p, i));
    html += '</div>';
  }

  catalog.innerHTML = html;
}

function cardHTML(p, i) {
  const id = getId(p);
  const vol = p.name.match(/(\d+ml)/i)?.[1] || '';
  const nameClean = p.name.replace(/\s*\d+ml\s*/i, '').trim();
  const emoji = p.cat==='fem'?'🌸':p.cat==='masc'?'🌊':'✨';
  const priceStr = fmtPrice(p.price, p.cat);

  const imgHtml = p.img
    ? `<img src="${p.img}" alt="${nameClean}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-img-ph><span class=ph-emoji>${emoji}</span><span class=ph-name>${nameClean}</span></div>'">`
    : `<div class="card-img-ph"><span class="ph-emoji">${emoji}</span><span class="ph-name">${nameClean}</span></div>`;

  return `<div class="product-card" style="animation-delay:${Math.min(i*0.025,0.4)}s" onclick="openModal('${id}')">
    <div class="card-cat-stripe ${p.cat}"></div>
    <div class="card-img">${imgHtml}</div>
    <div class="card-body">
      <div class="card-cat-tag ${p.cat}">${catLabels[p.cat]}</div>
      <div class="card-name">${nameClean}${vol ? ` <span class="card-vol">${vol}</span>` : ''}</div>
      ${p.dupe ? `<div class="card-dupe">✦ ${p.dupe.replace(/ - .+$/,'')}</div>` : ''}
      <div class="card-footer">
        <span class="card-price">${priceStr || (p.cat==='ext' ? 'Consultar' : '')}</span>
        <button class="card-add-btn" onclick="event.stopPropagation();addToCart('${id}')" title="Agregar al carrito">+</button>
      </div>
    </div>
  </div>`;
}

// ── MODAL ────────────────────────────────────────────────────────────────────
function openModal(id) {
  const p = productMap[id];
  if (!p) return;
  document.getElementById('modal-stripe').className = 'modal-stripe ' + p.cat;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  if (detailCache[id]) { renderModal(id, p, detailCache[id]); return; }

  const info = getNotesInfo(p);
  info.imagen_url = null;
  detailCache[id] = info;
  renderModal(id, p, info);
}

        ${priceStr ? `<div class="modal-price">${priceStr}</div>` : ''}
        ${p.dupe ? `<div class="modal-dupe-label">Inspirado en</div><div class="modal-dupe">✦ ${p.dupe}</div>` : ''}
        <div class="modal-badges">
          ${info.familia ? `<span class="modal-badge">${info.familia}</span>` : ''}
          ${info.int ? `<span class="modal-badge">⚡ ${info.int}</span>` : ''}

    <div class="notes-grid">${topNotes}${midNotes}${baseNotes}</div>

    <div class="modal-actions">

        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModalDirect(); }
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── CART ─────────────────────────────────────────────────────────────────────
let cart = {};

function addToCart(id) {
  const p = productMap[id];
  if (!p) return;
  if (cart[id]) cart[id].qty++;
  else cart[id] = {p, qty:1};
  updateBadge();
  showToast('🛒 ' + p.name.replace(/\s*\d+ml.*/i,'').trim() + ' agregado');
}

function removeFromCart(id) {
  delete cart[id];
  updateBadge();
  renderCart();
}

function updateBadge() {
  const total = Object.values(cart).reduce((s,i) => s+i.qty, 0);
  const badge = document.getElementById('cart-badge');
  badge.textContent = total;
  badge.style.display = total ? 'flex' : 'none';
}

function renderCart() {
  const list = document.getElementById('cart-items');
  const foot = document.getElementById('cart-foot');
  const items = Object.entries(cart);
  if (!items.length) {
    list.innerHTML = '<div class="cart-empty"><span style="font-size:2rem">🛒</span><span>Tu carrito está vacío</span></div>';
    foot.style.display = 'none';
    return;
  }
  foot.style.display = 'block';
  let total = 0;
  list.innerHTML = items.map(([id, {p, qty}]) => {
    const subtotal = p.price * qty;
    total += subtotal;
    const nameClean = p.name.replace(/\s*\d+ml\s*/i,'').trim();
    const priceStr = p.price > 0 ? fmtPrice(subtotal, p.cat) : 'Consultar';
    return `<div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${nameClean}${qty>1?` ×${qty}`:''}</div>
        <div class="cart-item-brand">${p.brand} · ${catLabels[p.cat]}</div>
      </div>
      <span class="cart-item-price">${priceStr}</span>
      <button class="cart-item-remove" onclick="removeFromCart('${id}')">✕</button>
    </div>`;
  }).join('');
  document.getElementById('cart-total').textContent = total > 0 ? '$' + total.toLocaleString('es-AR') : 'Consultar';
}

function openCart() { renderCart(); document.getElementById('cart-overlay').classList.add('open'); document.body.style.overflow='hidden'; }
function closeCartOutside(e) { if (e.target===document.getElementById('cart-overlay')) closeCartDirect(); }
function closeCartDirect() { document.getElementById('cart-overlay').classList.remove('open'); document.body.style.overflow=''; }

function checkoutWhatsApp() {
  const items = Object.values(cart);
  if (!items.length) return;
  let msg = 'Hola! Me gustaría consultar sobre los siguientes perfumes:\n\n';
  let total = 0;
  items.forEach(({p,qty}) => {
    const sub = p.price*qty; total+=sub;
    msg += `• *${p.name}* de *${p.brand}*`;
    if(qty>1) msg+=` (x${qty})`;
    if(p.price>0) msg+=` — ${fmtPrice(sub,p.cat)}`;
    msg+='\n';
  });
  if(total>0) msg+=`\n*Total: $${total.toLocaleString('es-AR')}*`;
  msg+='\n\n¿Están disponibles?';
  window.open('https://wa.me/5491153114305?text='+encodeURIComponent(msg),'_blank');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity='1';
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.style.opacity='0', 2200);
}

function toggleMobileMenu() {
  const panel = document.getElementById('mobile-menu-panel');
  const overlay = document.getElementById('mobile-menu-overlay');
  const isOpen = panel.style.display === 'flex';
  panel.style.display = isOpen ? 'none' : 'flex';
  panel.style.flexDirection = 'column';
  overlay.style.display = isOpen ? 'none' : 'block';
  document.body.style.overflow = isOpen ? '' : 'hidden';
}
function closeMobileMenu() {
  document.getElementById('mobile-menu-panel').style.display = 'none';
  document.getElementById('mobile-menu-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeModalDirect(); closeCartDirect(); } });

// ── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('shown-count').textContent = allProducts.filter(p=>p.cat!=='ext'||true).length;
render();
</script>
